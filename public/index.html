<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181d;
      --border: #2a2a32;
      --text: #e8e6e3;
      --text-muted: #8b8b92;
      --accent: #c9a227;
      --accent-soft: rgba(201, 162, 39, 0.15);
      --user-bg: #1e1e24;
      --assistant-bg: #16161a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Outfit", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.55;
    }

    .header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(24, 24, 29, 0.8);
      backdrop-filter: blur(12px);
    }

    .header h1 {
      font-weight: 500;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
      color: var(--text-muted);
    }

    .header h1 span {
      color: var(--accent);
      font-weight: 600;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 42rem;
      margin: 0 auto;
      width: 100%;
    }

    .message {
      display: flex;
      gap: 0.75rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .message.assistant .avatar {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .message.user .avatar {
      background: var(--border);
      color: var(--text-muted);
    }

    .bubble {
      max-width: 85%;
      padding: 0.9rem 1.1rem;
      border-radius: 14px;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.assistant .bubble {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
    }

    .input-area {
      padding: 1rem 1.5rem 1.5rem;
      border-top: 1px solid var(--border);
      background: rgba(24, 24, 29, 0.6);
      backdrop-filter: blur(12px);
    }

    .input-wrap {
      max-width: 42rem;
      margin: 0 auto;
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.85rem 1rem;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #input::placeholder {
      color: var(--text-muted);
    }

    #input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    #send {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
    }

    #send:hover {
      opacity: 0.95;
      transform: scale(1.02);
    }

    #send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 0.5rem 0;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 0.6s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.1s; }
    .typing span:nth-child(3) { animation-delay: 0.2s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .error {
      color: #e07a7a;
      font-size: 0.9rem;
      padding: 0.5rem 0;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1><span>AI</span> Chat</h1>
  </header>

  <main class="chat" id="chat"></main>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Message..." rows="1"></textarea>
      <button type="button" id="send" aria-label="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
